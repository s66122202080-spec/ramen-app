<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 แดชบอร์ด | Ramen Staff</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    /* Toast เล็กลง อยู่บนสุด */
    .order-toast {
      position: fixed;
      top: 12px;
      right: 16px;
      left: auto;
      transform: translateY(-80px);
      background: linear-gradient(135deg, #E84545, #ff6b35);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans Thai', sans-serif;
      box-shadow: 0 4px 16px rgba(232,69,69,0.5);
      z-index: 9999;
      transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }
    .order-toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    /* popup เริ่มรับออเดอร์ */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    #start-overlay.hidden { display: none; }
    #start-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 24px;
      padding: 40px 36px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    #start-box .start-emoji { font-size: 56px; margin-bottom: 16px; }
    #start-box h2 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #start-box p {
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.7;
    }
    #btn-start {
      width: 100%;
      background: linear-gradient(135deg, #E84545, #ff6b35);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 17px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }
  </style>
</head>
<body class="dash-page">
  <div id="app">

    <!-- popup unlock เสียง iPhone -->
    <div id="start-overlay">
      <div id="start-box">
        <div class="start-emoji">🍜</div>
        <h2>STAFF PANEL</h2>
        <p>กดปุ่มด้านล่างเพื่อเริ่มรับออเดอร์<br>และเปิดใช้งานเสียงแจ้งเตือน</p>
        <button id="btn-start" onclick="startDashboard()">🔔 เริ่มรับออเดอร์</button>
      </div>
    </div>

    <header class="dash-header">
      <div class="header-content">
        <div class="logo-area">
          <span class="logo-kr">대시</span>
          <div class="logo-text">
            <h1>STAFF PANEL</h1>
            <p>ระบบจัดการออเดอร์</p>
          </div>
        </div>
        <div class="header-tabs">
          <button class="htab active" id="htab-orders" onclick="switchTab('orders')">📋 ออเดอร์</button>
          <button class="htab" id="htab-stats" onclick="switchTab('stats')">📈 สถิติ</button>
          <button class="htab" id="btn-sound" onclick="toggleSound()">🔔 เสียงเปิด</button>
        </div>
      </div>
    </header>

    <!-- TAB: ORDERS -->
    <div id="tab-orders" class="tab-content active">
      <div class="dash-body">
        <div id="dash-summary" class="dash-summary"></div>
        <div class="orders-toolbar">
          <h2>
            ออเดอร์วันนี้ <span id="order-count" class="badge">0</span>
            <span class="last-refresh" id="last-refresh"></span>
          </h2>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;">
            <div class="filter-tabs">
              <button class="tab active" onclick="filterOrders('all',this)">ทั้งหมด</button>
              <button class="tab" onclick="filterOrders('pending',this)">⏳ รอทำ</button>
              <button class="tab" onclick="filterOrders('done',this)">✅ เสร็จแล้ว</button>
            </div>
            <button
              onclick="deleteAllOrders()"
              style="background:transparent;color:#E84545;border:2px solid #E84545;border-radius:8px;padding:8px 16px;font-size:14px;font-family:'Noto Sans Thai',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;">
              🗑 ลบทั้งหมด
            </button>
          </div>
        </div>
        <div id="orders-list" class="orders-list"></div>
      </div>
    </div>

    <!-- TAB: STATS -->
    <div id="tab-stats" class="tab-content">
      <div class="stats-body" id="stats-body"></div>
    </div>

  </div>
  <script src="data.js"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
  <script>
    function startDashboard() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        ctx.resume();
      } catch(e) {}
      document.getElementById('start-overlay').classList.add('hidden');
    }
  </script>
</body>
</html>
